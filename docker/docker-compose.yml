version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: erasmushub_postgres
    restart: always
    environment:
      POSTGRES_USER: erasmus
      POSTGRES_PASSWORD: erasmuspass
      POSTGRES_DB: erasmushub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: erasmushub_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erasmus.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: